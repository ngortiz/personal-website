<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Glow Circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#glowGrad)" stroke-width="6" opacity="0.3" filter="url(#glow)" />
  <!-- Main Brand Ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#glowGrad)" stroke-width="4" />
  <!-- Brand Monogram (N for Nidia) -->
  <path d="M38 65 V35 L58 60 V35" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M38 65 V35 L58 60 V35" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
